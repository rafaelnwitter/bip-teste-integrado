# docker-compose.yml
# Sobe o banco de dados PostgreSQL para o projeto BIP Teste Integrado.
# Uso: docker-compose up -d
#
# Serviços:
#   - db: PostgreSQL 16 (porta 5432)
#   - backend: Spring Boot (porta 8082)
#
# O backend pode ser executado localmente (Spring Boot :8085) via mvn spring-boot:run
# ou via Docker (porta :8082). O frontend (Angular :4200) é executado localmente via ng serve.

services:
  db:
    image: postgres:16-alpine
    container_name: postgres_dev
    environment:
      POSTGRES_DB: backend_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend-module/src/main/resources/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./backend-module/src/main/resources/db/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d backend_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: backend_app
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/backend_db
      SPRING_DATASOURCE_USERNAME: admin
      SPRING_DATASOURCE_PASSWORD: admin123
      SPRING_DATASOURCE_DRIVER: org.postgresql.Driver
    ports:
      - "8082:8082"

volumes:
  postgres_data:
